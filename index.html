<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Theater Seat Booking System</title>

		<!-- CSS External Link -->
		<link rel="stylesheet" href="style.css" />

		<!-- Google Inter Font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>

	<body>
		<header class="header">
			<h1>Theater Seat Booking System</h1>
			<p>Enter a seat number and book your preferred seat.</p>
		</header>

		<main>
			<!-- Header Screen & Seats -->
			<section class="theater">
				<div class="screen">
					<h2>SCREEN</h2>
				</div>

				<!-- Available and booked indicator -->
				<div class="seat-legend">
					<div class="legend-item">
						<span class="available-box"></span>
						<span>Available</span>
					</div>

					<div class="legend-item">
						<span class="booked-box"></span>
						<span>Booked</span>
					</div>
				</div>

				<div id="seat-container" class="seat-container"></div>
			</section>

			<!-- Input Field & Book Seat Button -->
			<section class="booking-section">
				<h2>Book Your Seat</h2>

				<!-- Input Form & Button -->
				<form id="booking-form">
					<div class="form-group">
						<label for="seat-input">Seat Number</label>

						<input
							type="text"
							id="seat-input"
							placeholder="Enter seat number (e.g. A1, B12)"
						/>
					</div>

					<button type="submit">Book Seat</button>
				</form>
			</section>

			<!-- Stats -->
			<section class="stats-section">
				<div class="stat-card">
					<h3>Total Seats</h3>
					<p id="total-seats">0</p>
				</div>

				<div class="stat-card">
					<h3>Available</h3>
					<p id="available-seats">0</p>
				</div>

				<div class="stat-card">
					<h3>Booked</h3>
					<p id="booked-seats">0</p>
				</div>
			</section>
		</main>

		<script src="localDB.js"></script>
		<script src="script.js"></script>
	</body>
</html>
